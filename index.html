<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChartLeap - Ultimate 3D Void</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Montserrat', sans-serif; color: white; }
        
        #three-container { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; 
        }

        /* Glassmorphism Header */
        header {
            position: fixed; top: 0; width: 100%; height: 80px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; z-index: 100;
            border-bottom: 1px solid rgba(0, 242, 254, 0.2);
            box-sizing: border-box;
        }

        .logo h1 { 
            font-family: 'Cinzel', serif; color: #00f2fe; margin: 0; 
            font-size: 1.8rem; letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.8);
        }

        nav ul { display: flex; gap: 35px; list-style: none; margin: 0; }
        nav ul li a { 
            color: #fff; text-decoration: none; font-weight: 600; 
            font-size: 0.85rem; letter-spacing: 2px; transition: 0.4s;
            opacity: 0.7;
        }
        nav ul li a:hover { opacity: 1; color: #00f2fe; text-shadow: 0 0 10px #00f2fe; }

        /* Hero Section */
        .hero { 
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center; 
            pointer-events: none; user-select: none;
        }
        .hero h2 { 
            font-family: 'Cinzel', serif; font-size: clamp(3rem, 12vw, 8rem); 
            margin: 0; line-height: 1;
            background: linear-gradient(to bottom, #fff, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(0, 242, 254, 0.5));
        }
        .hero p { 
            color: #00f2fe; font-size: clamp(0.7rem, 2vw, 1.2rem); 
            letter-spacing: 12px; margin-top: 10px; opacity: 0.8;
            text-transform: uppercase;
        }

        /* Simple Scanline Effect */
        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 99;
        }
    </style>
</head>
<body>

    <div id="three-container"></div>

    <header>
        <div class="logo"><h1>CHARTLEAP</h1></div>
        <nav>
            <ul>
                <li><a href="index.html">HOME</a></li>
                <li><a href="notes.html">NOTES</a></li>
                <li><a href="simulations.html">LAB</a></li>
                <li><a href="test.html">TEST</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <h2>CHARTLEAP</h2>
        <p>Deep 3D Learning Void</p>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, stars, snake, buildings = [];
        let mouseX = 0, mouseY = 0;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.015);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.z = 60;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('three-container').appendChild(renderer.domElement);

            createStars();
            createSnake();
            createCity();
            createLights();

            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function createStars() {
            const geo = new THREE.BufferGeometry();
            const pos = [];
            for (let i = 0; i < 10000; i++) {
                pos.push(THREE.MathUtils.randFloatSpread(1000), THREE.MathUtils.randFloatSpread(1000), THREE.MathUtils.randFloatSpread(1000));
            }
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            const mat = new THREE.PointsMaterial({ color: 0x00f2fe, size: 0.7, transparent: true, opacity: 0.8 });
            stars = new THREE.Points(geo, mat);
            scene.add(stars);
        }

        function createSnake() {
            const curve = new THREE.CatmullRomCurve3([
                new THREE.Vector3(-40, 0, -20),
                new THREE.Vector3(-20, 15, 0),
                new THREE.Vector3(0, -15, 10),
                new THREE.Vector3(20, 15, 0),
                new THREE.Vector3(40, 0, -20)
            ]);
            const geo = new THREE.TubeGeometry(curve, 150, 0.8, 16, false);
            const mat = new THREE.MeshPhongMaterial({ 
                color: 0x00f2fe, 
                emissive: 0x006677, 
                wireframe: true,
                shininess: 100 
            });
            snake = new THREE.Mesh(geo, mat);
            scene.add(snake);
        }

        function createCity() {
            const group = new THREE.Group();
            for (let i = 0; i < 120; i++) {
                const h = Math.random() * 25 + 5;
                const geo = new THREE.BoxGeometry(2, h, 2);
                const mat = new THREE.MeshPhongMaterial({ 
                    color: 0x001122, 
                    emissive: 0x002233, 
                    wireframe: true, 
                    transparent: true, 
                    opacity: 0.4 
                });
                const b = new THREE.Mesh(geo, mat);
                b.position.set(Math.random() * 200 - 100, -25, Math.random() * 150 - 100);
                b.userData.originalY = b.position.y;
                b.userData.speed = Math.random() * 0.02;
                buildings.push(b);
                group.add(b);
            }
            scene.add(group);
        }

        function createLights() {
            const ambient = new THREE.AmbientLight(0x404040, 2);
            scene.add(ambient);

            const spot = new THREE.SpotLight(0x00f2fe, 3);
            spot.position.set(0, 50, 50);
            spot.angle = 0.5;
            spot.penumbra = 0.5;
            scene.add(spot);
        }

        function onMouseMove(e) {
            mouseX = (e.clientX - window.innerWidth / 2) / 100;
            mouseY = (e.clientY - window.innerHeight / 2) / 100;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            // Snake Movement
            snake.rotation.y = time * 0.2;
            snake.position.y = Math.sin(time) * 2;

            // City "Breathing"
            buildings.forEach(b => {
                b.position.y = b.userData.originalY + Math.sin(time + b.position.x) * 2;
            });

            // Stars Movement
            stars.rotation.z += 0.0005;
            stars.position.z += 0.5;
            if(stars.position.z > 200) stars.position.z = 0;

            // Camera Follow Mouse
            camera.position.x += (mouseX - camera.position.x) * 0.05;
            camera.position.y += (-mouseY - camera.position.y) * 0.05;
            camera.lookAt(scene.position);

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
