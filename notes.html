    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Orbitron:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* [यहाँ पिछला CSS कोड पेस्ट करें - जो मैंने पहले दिया था] */
        :root { --neon: #00f2fe; --bg: #000205; --panel: rgba(0, 15, 30, 0.7); --border: rgba(0, 242, 254, 0.3); --card-bg: rgba(0, 5, 15, 0.9); }
        body { margin: 0; background: var(--bg); color: #e0e0e0; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
        #star-canvas { position: fixed; top: 0; left: 0; z-index: -2; }
        .grid-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: linear-gradient(rgba(0, 242, 254, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 254, 0.03) 1px, transparent 1px); background-size: 40px 40px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 0 50px; height: 80px; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px); border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .logo h1 { font-family: 'Cinzel', serif; color: var(--neon); margin: 0; letter-spacing: 4px; text-shadow: 0 0 15px var(--neon); }
        nav a { text-decoration: none; color: #fff; font-family: 'Orbitron', sans-serif; font-size: 0.75rem; margin-left: 20px; letter-spacing: 1px; transition: 0.3s; }
        nav a:hover { color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        main { max-width: 1200px; margin: 40px auto; padding: 20px; }
        h1 { font-family: 'Orbitron', sans-serif; text-align: center; color: #fff; letter-spacing: 5px; }
        .subtitle { text-align: center; color: var(--neon); font-size: 0.8rem; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 4px; }
        .filters { background: var(--panel); border: 1px solid var(--border); padding: 25px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 50px; border-radius: 4px; }
        .filters input, .filters select { background: rgba(0,0,0,0.5); border: 1px solid var(--border); padding: 12px; color: #fff; font-family: 'Orbitron', sans-serif; font-size: 0.8rem; outline: none; }
        .filters button { background: var(--neon); color: #000; font-family: 'Orbitron', sans-serif; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); padding: 25px; border-radius: 2px; transition: 0.4s; position: relative; overflow: hidden; }
        .card:hover { border-color: var(--neon); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0, 242, 254, 0.15); }
        .card h3 { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; margin: 0 0 10px 0; color: #fff; }
        .card small { color: var(--neon); text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; }
        .card p { font-size: 0.9rem; opacity: 0.7; margin: 15px 0; line-height: 1.6; }
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 10px; text-align: center; text-decoration: none; font-family: 'Orbitron', sans-serif; font-size: 0.7rem; font-weight: bold; transition: 0.3s; cursor: pointer; border-radius: 2px; }
        .btn-view { background: rgba(0, 242, 254, 0.1); color: var(--neon); border: 1px solid var(--neon); }
        .btn-download { background: var(--neon); color: #000; border: 1px solid var(--neon); }
    </style>
</head>
<body>

    <canvas id="star-canvas"></canvas>
    <div class="grid-overlay"></div>

    <header>
        <div class="logo"><h1>CHARTLEAP</h1></div>
        <nav>
            <a href="index.html">HOME</a>
            <a href="graph.html">GRAPH</a>
            <a href="simulations.html">LAB</a>
            <a href="notes.html">NOTES</a>
            <a href="test.html">TEST</a>
        </nav>
    </header>

    <main>
        <article> <h1>DATABASE_ARCHIVE</h1>
            <div class="subtitle">Premium Intel • Class 9–12</div>

            <section class="filters" aria-label="Filter Notes">
                <input type="text" id="search" placeholder="SEARCH_CHAPTER..." oninput="runFilter()">
                <select id="classF" onchange="runFilter()">
                    <option value="">ALL_CLASSES</option>
                    <option value="9">CLASS_9</option>
                    <option value="10">CLASS_10</option>
                    <option value="11">CLASS_11</option>
                    <option value="12">CLASS_12</option>
                </select>
                <select id="subjectF" onchange="runFilter()">
                    <option value="">ALL_SUBJECTS</option>
                    <option value="English">ENGLISH</option>
                    <option value="Science">SCIENCE</option>
                    <option value="Math">MATH</option>
                </select>
                <input type="text" id="chapterF" placeholder="CHAPTER_TAG..." oninput="runFilter()">
                <button onclick="runFilter()">APPLY_FILTER</button>
            </section>

            <section class="container" id="notesList" aria-label="Notes List">
                </section>
        </article>
    </main>

    <footer>
        <div style="text-align:center; padding: 40px; opacity:0.5; font-size: 0.8rem; border-top: 1px solid var(--border);">
            <p>&copy; 2026 ChartLeap. All educational assets protected.</p>
            <a href="/privacy-policy" style="color:#fff; margin:0 10px;">Privacy</a>
            <a href="/Disclaimer.html" style="color:#fff; margin:0 10px;">Disclaimer</a>
        </div>
    </footer>

    <script>
        /* [यहाँ पिछला Star Background और Filter Logic वाला Script पेस्ट करें] */
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function initStars() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; stars = []; for(let i=0; i<150; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2}); }
        function animate() { ctx.clearRect(0,0,canvas.width, canvas.height); ctx.fillStyle = "#00f2fe"; stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill(); s.y += 0.5; if(s.y > canvas.height) s.y = 0; }); requestAnimationFrame(animate); }
        initStars(); animate();

        const allNotes = [
            { class: "9-12", subject: "English", chapter: "Application to the Principal", shortDesc: "Fee Concession / Fees Maafi ke liye.", pdf: "Application to the Principal (Fee Concession - Fees Maafi ke liye).pdf" },
            { class: "9-12", subject: "English", chapter: "Letter to Father", shortDesc: "Exam Preparation - Taiyari batane ke liye.", pdf: "Letter to Father (Exam Preparation - Taiyari batane ke liye).pdf" },
            { class: "9-12", subject: "English", chapter: "Letter to Friend", shortDesc: "Inviting for Birthday - Janmdin par bulane ke liye.", pdf: "Letter to Friend (Inviting for Birthday - Janmdin par bulane ke liye).pdf" },
            { class: "9-12", subject: "English", chapter: "Letter to the Editor", shortDesc: "Frequent Power Cut - Bijli ki samasya.", pdf: "Letter to the Editor (Frequent Power Cut - Bijli ki samasya).pdf" }
        ];

        function showNotes(notesToShow) {
            document.getElementById('notesList').innerHTML = notesToShow.map(note => `
                <div class="card">
                    <small>${note.subject} • CLASS ${note.class}</small>
                    <h3>${note.chapter}</h3>
                    <p>${note.shortDesc || 'Comprehensive revision notes for board exams.'}</p>
                    <div class="btn-group">
                        <div class="btn btn-view" onclick="alert('Accessing PDF...')">VIEW_INTEL</div>
                        <a href="${note.pdf}" download class="btn btn-download">DOWNLOAD</a>
                    </div>
                </div>
            `).join('');
        }
        function runFilter() {
            const s = document.getElementById('search').value.toLowerCase();
            const cls = document.getElementById('classF').value;
            const sub = document.getElementById('subjectF').value.toLowerCase();
            const result = allNotes.filter(n => (!cls || n.class.includes(cls)) && (!sub || n.subject.toLowerCase().includes(sub)) && n.chapter.toLowerCase().includes(s));
            showNotes(result);
        }
        runFilter();
    </script>
</body>
</html>
