<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Turbo Dash: Mobile Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #87ceeb; font-family: 'Inter', sans-serif; touch-action: none; -webkit-user-select: none; }
        canvas { display: block; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            color: #1a1a1a;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 10px 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        #overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(135, 206, 235, 1) 0%, rgba(100, 149, 237, 1) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        /* Control Zones for Mobile */
        .touch-zone {
            position: absolute;
            bottom: 0;
            height: 60%;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.3;
            color: white;
            font-weight: bold;
            font-size: 12px;
        }
        #steer-left { left: 0; width: 25%; background: linear-gradient(to right, rgba(0,0,0,0.1), transparent); }
        #steer-right { left: 25%; width: 25%; background: linear-gradient(to left, rgba(0,0,0,0.1), transparent); border-right: 1px solid rgba(255,255,255,0.1); }

        .pedal-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
            pointer-events: auto;
        }

        .pedal {
            width: 70px;
            height: 110px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        .pedal:active { transform: scale(0.92) translateY(4px); }
        .pedal-accel { border-bottom: 6px solid #f43f5e; }
        .pedal-brake { border-bottom: 6px solid #3b82f6; }

        #countdown {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px;
            font-weight: 900;
            color: #f43f5e;
            display: none;
            z-index: 50;
        }
    </style>
</head>
<body>

<div id="overlay">
    <div class="text-center mb-8 px-4">
        <h1 class="text-5xl md:text-8xl font-orbitron font-black italic text-white mb-2 drop-shadow-xl">TURBO PRO</h1>
        <p class="text-blue-900 tracking-widest font-bold text-xs uppercase opacity-80">Mobile Realistic Edition</p>
    </div>
    
    <button class="bg-rose-600 text-white px-12 py-4 rounded-xl font-bold uppercase tracking-widest shadow-lg pointer-events-auto" onclick="initiateStart()">Engage Engine</button>
    
    <div id="gameover-ui" class="hidden text-center mt-6">
        <h2 class="text-4xl font-orbitron font-bold text-red-600 mb-2">CRASHED!</h2>
        <p class="text-gray-800 font-bold">Score: <span id="finalScore">0</span></p>
    </div>
</div>

<!-- Mobile Steering Zones -->
<div id="steer-left" class="touch-zone">STEER L</div>
<div id="steer-right" class="touch-zone">STEER R</div>

<div id="countdown" class="font-orbitron">3</div>

<div id="ui-layer">
    <div class="flex justify-between items-start">
        <div class="glass">
            <p class="text-[10px] text-rose-600 font-black uppercase">Score</p>
            <p class="text-2xl font-orbitron font-black" id="score">0</p>
        </div>
        <div class="glass text-right">
            <p class="text-[10px] text-blue-600 font-black uppercase">MPH</p>
            <p class="text-2xl font-orbitron font-black" id="speedDisplay">0</p>
        </div>
    </div>

    <!-- Pedals for Mobile -->
    <div class="pedal-container">
        <div id="brake-pedal" class="pedal pedal-brake">
            <span class="text-[9px] font-black uppercase text-blue-600">Brake</span>
        </div>
        <div id="accel-pedal" class="pedal pedal-accel">
            <span class="text-[9px] font-black uppercase text-rose-600">Gas</span>
        </div>
    </div>
</div>

<script>
    let scene, camera, renderer, player, road;
    let enemies = [], buildings = [], items = [], lanes = [];
    let gameActive = false, score = 0;
    
    // --- REALISTIC PHYSICS ---
    let speed = 0;
    let targetSpeedCap = 0.35; // Thoda slow cap
    let acceleration = 0.0006; // Realistic pick-up
    let friction = 0.0004;     // Natural engine braking
    let brakingPower = 0.008;  // Real brake feel
    
    let isAccelerating = false, isBraking = false, steerDir = 0, currentLanePos = 0;
    const LANE_WIDTH = 4.5;
    
    const ui = {
        score: document.getElementById('score'),
        finalScore: document.getElementById('finalScore'),
        speedDisplay: document.getElementById('speedDisplay'),
        overlay: document.getElementById('overlay'),
        gameOverUi: document.getElementById('gameover-ui'),
        countdown: document.getElementById('countdown'),
        accelBtn: document.getElementById('accel-pedal'),
        brakeBtn: document.getElementById('brake-pedal'),
        steerL: document.getElementById('steer-left'),
        steerR: document.getElementById('steer-right')
    };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        // Long Range Visibility
        scene.fog = new THREE.Fog(0x87ceeb, 100, 1000);

        camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 5, 14);
        camera.lookAt(0, 1, -10);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(100, 200, 50);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6), sun);

        createEnvironment();
        createPlayer();

        // --- MULTI-TOUCH MOBILE CONTROLS ---
        const setupControl = (el, startAction, endAction) => {
            el.addEventListener('touchstart', (e) => { e.preventDefault(); startAction(); }, {passive: false});
            el.addEventListener('touchend', (e) => { e.preventDefault(); endAction(); }, {passive: false});
            el.addEventListener('mousedown', startAction);
            el.addEventListener('mouseup', endAction);
        };

        setupControl(ui.accelBtn, () => isAccelerating = true, () => isAccelerating = false);
        setupControl(ui.brakeBtn, () => isBraking = true, () => isBraking = false);
        setupControl(ui.steerL, () => steerDir = -1, () => steerDir = 0);
        setupControl(ui.steerR, () => steerDir = 1, () => steerDir = 0);

        // Keyboard Fallback
        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp' || e.key === 'w') isAccelerating = true;
            if (e.key === 'ArrowDown' || e.key === 's') isBraking = true;
            if (e.key === 'ArrowLeft' || e.key === 'a') steerDir = -1;
            if (e.key === 'ArrowRight' || e.key === 'd') steerDir = 1;
        });
        window.addEventListener('keyup', e => {
            if (e.key === 'ArrowUp' || e.key === 'w') isAccelerating = false;
            if (e.key === 'ArrowDown' || e.key === 's') isBraking = false;
            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'a' || e.key === 'd') steerDir = 0;
        });

        window.addEventListener('resize', onWindowResize);
        animate();
    }

    function createEnvironment() {
        // Endless Road
        road = new THREE.Mesh(new THREE.PlaneGeometry(24, 3000), new THREE.MeshPhongMaterial({ color: 0x333333 }));
        road.rotation.x = -Math.PI / 2;
        scene.add(road);

        // Grass Side
        const grass = new THREE.Mesh(new THREE.PlaneGeometry(1000, 3000), new THREE.MeshPhongMaterial({ color: 0x3d7a37 }));
        grass.rotation.x = -Math.PI / 2; grass.position.y = -0.1; scene.add(grass);

        // Long Range Buildings & Mountains
        for(let i=0; i<100; i++) {
            const h = 20 + Math.random() * 50;
            const b = new THREE.Mesh(new THREE.BoxGeometry(15, h, 15), new THREE.MeshPhongMaterial({ color: 0xdddddd }));
            b.position.set((Math.random() > 0.5 ? 1 : -1) * (45 + Math.random()*30), h/2, -i * 20);
            scene.add(b);
            buildings.push(b);
        }

        // Lanes
        for (let z = -1500; z < 100; z += 20) {
            [-LANE_WIDTH/2, LANE_WIDTH/2].forEach(x => {
                const line = new THREE.Mesh(new THREE.PlaneGeometry(0.2, 8), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                line.rotation.x = -Math.PI / 2; line.position.set(x, 0.02, z);
                scene.add(line); lanes.push(line);
            });
        }
    }

    function createPlayer() {
        player = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.7, 4.5), new THREE.MeshPhongMaterial({ color: 0xf43f5e }));
        body.position.y = 0.6; player.add(body);
        const glass = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.6, 2.4), new THREE.MeshPhongMaterial({ color: 0x111111 }));
        glass.position.set(0, 1.1, -0.2); player.add(glass);
        scene.add(player);
    }

    function createVehicleMesh(type, color) {
        const group = new THREE.Group();
        const body = new THREE.Mesh(
            new THREE.BoxGeometry(2.4, type === 'bus' ? 2.5 : 0.8, type === 'bus' ? 10 : 5),
            new THREE.MeshPhongMaterial({ color })
        );
        body.position.y = type === 'bus' ? 1.4 : 0.6;
        group.add(body);
        return group;
    }

    function initiateStart() {
        ui.overlay.style.opacity = '0';
        ui.countdown.style.display = 'block';
        let count = 3;
        ui.countdown.innerText = count;
        const timer = setInterval(() => {
            count--;
            ui.countdown.innerText = count > 0 ? count : "GO!";
            if(count < 0) {
                clearInterval(timer);
                ui.countdown.style.display = 'none';
                ui.overlay.classList.add('hidden');
                startGame();
            }
        }, 700);
    }

    function startGame() {
        gameActive = true; score = 0; speed = 0; currentLanePos = 0; targetSpeedCap = 0.35;
        player.position.set(0, 0, 0);
        enemies.forEach(e => scene.remove(e.mesh)); enemies = [];
        ui.gameOverUi.classList.add('hidden');
    }

    function gameOver() {
        gameActive = false;
        ui.finalScore.innerText = Math.floor(score);
        ui.overlay.classList.remove('hidden');
        ui.overlay.style.opacity = '1';
        ui.gameOverUi.classList.remove('hidden');
    }

    function update() {
        if (!gameActive) return;

        // --- REALISTIC SPEED CONTROL ---
        if (isAccelerating) {
            speed += acceleration;
            if (speed > targetSpeedCap) speed = targetSpeedCap;
        } else if (isBraking) {
            speed -= brakingPower;
            if (speed < 0) speed = 0;
        } else {
            speed -= friction; // Engine braking
            if (speed < 0) speed = 0;
        }

        score += speed * 5;
        ui.score.innerText = Math.floor(score);
        ui.speedDisplay.innerText = Math.floor(speed * 450);

        // --- SMOOTH STEERING ---
        if (steerDir !== 0) {
            currentLanePos += steerDir * 0.15; // Slow steering for realism
        }
        // Limit road range
        currentLanePos = Math.max(-LANE_WIDTH, Math.min(LANE_WIDTH, currentLanePos));
        player.position.x += (currentLanePos - player.position.x) * 0.15;
        player.rotation.z = (currentLanePos - player.position.x) * -0.05;

        // Camera follow
        camera.position.x = player.position.x * 0.2;
        camera.fov = 65 + (speed * 25);
        camera.updateProjectionMatrix();

        // Scrolling Environment
        const scrollSpeed = speed * 40;
        lanes.forEach(l => { l.position.z += scrollSpeed; if(l.position.z > 50) l.position.z -= 1500; });
        buildings.forEach(b => { b.position.z += scrollSpeed * 0.8; if(b.position.z > 100) b.position.z = -1500; });

        // Traffic Logic
        if (Math.random() < 0.015 && enemies.length < 5 && speed > 0.05) {
            const laneX = (Math.floor(Math.random() * 3) - 1) * LANE_WIDTH;
            const type = Math.random() > 0.7 ? 'bus' : 'car';
            const enemy = createVehicleMesh(type, new THREE.Color().setHSL(Math.random(), 0.6, 0.5));
            enemy.position.set(laneX, 0, -800); // Dur se spawn
            scene.add(enemy);
            enemies.push({ mesh: enemy, type, speed: speed * 0.2 });
        }

        for (let i = enemies.length - 1; i >= 0; i--) {
            const e = enemies[i];
            e.mesh.position.z += scrollSpeed + (e.speed * 40);
            
            // Collision Detection
            const dx = Math.abs(player.position.x - e.mesh.position.x);
            const dz = Math.abs(player.position.z - e.mesh.position.z);
            const hitDepth = e.type === 'bus' ? 8.0 : 4.8;

            if (dx < 2.0 && dz < hitDepth) gameOver();
            if (e.mesh.position.z > 100) { scene.remove(e.mesh); enemies.splice(i, 1); }
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        update();
        renderer.render(scene, camera);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    window.onload = init;
</script>
</body>
</html>
