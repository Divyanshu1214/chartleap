<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Turbo Dash: Pro Plus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #87ceeb; font-family: 'Inter', sans-serif; touch-action: none; }
        canvas { display: block; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            color: #1a1a1a;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 20px;
            padding: 12px 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        #overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(135, 206, 235, 0.9) 0%, rgba(100, 149, 237, 1) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s;
        }

        .btn-pro {
            background: linear-gradient(135deg, #f43f5e 0%, #881337 100%);
            color: white;
            padding: 18px 50px;
            border-radius: 15px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            pointer-events: auto;
            border: none;
        }

        #nitro-bar-container {
            width: 150px;
            height: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 5px;
            overflow: hidden;
            margin-top: 5px;
        }
        #nitro-fill {
            width: 0%;
            height: 100%;
            background: #3b82f6;
            transition: width 0.1s;
        }

        .pedal {
            width: 80px;
            height: 120px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            cursor: pointer;
        }
        .pedal-accel { border-bottom: 6px solid #f43f5e; }
        .pedal-brake { border-bottom: 6px solid #3b82f6; }
    </style>
</head>
<body>

<div id="overlay">
    <div class="text-center mb-12 px-4">
        <h1 class="text-6xl md:text-8xl font-orbitron font-black italic text-white tracking-tighter mb-2 drop-shadow-xl">TURBO PLUS</h1>
        <p class="text-blue-900 tracking-[0.3em] font-bold text-xs uppercase opacity-70">Long Range Visibility • Huge Buses • Pro Physics</p>
    </div>
    
    <div id="start-menu" class="text-center">
        <button class="btn-pro font-orbitron" onclick="initiateStart()">Start Race</button>
        <div class="mt-6 flex gap-4 justify-center text-[10px] font-bold uppercase text-blue-900">
            <span>🔵 Nitro</span>
            <span>🟡 Coins</span>
            <span>🟢 Shield</span>
        </div>
    </div>

    <div id="gameover-menu" class="hidden text-center">
        <h2 class="text-6xl font-orbitron font-bold text-red-600 mb-4">WRECKED</h2>
        <div class="glass inline-block mb-8">
            <p class="text-5xl font-orbitron font-black text-gray-900" id="finalScore">0</p>
        </div>
        <br>
        <button class="btn-pro font-orbitron" onclick="initiateStart()">Try Again</button>
    </div>
</div>

<div id="ui-layer">
    <div class="flex justify-between items-start">
        <div class="glass">
            <p class="text-[10px] text-rose-600 font-black uppercase">Score</p>
            <p class="text-4xl font-orbitron font-black text-gray-900" id="score">0</p>
        </div>
        <div class="glass text-right">
            <p class="text-[10px] text-blue-600 font-black uppercase tracking-widest">Nitro Boost</p>
            <div id="nitro-bar-container"><div id="nitro-fill"></div></div>
            <p id="shield-status" class="text-[9px] font-bold text-green-600 mt-1 hidden italic">🛡️ SHIELD ACTIVE</p>
        </div>
    </div>

    <div class="flex justify-between items-end gap-4">
        <div id="brake-pedal" class="pedal pedal-brake">
            <span class="text-[10px] font-black uppercase text-blue-600 mb-2">Brake</span>
            <div class="w-8 h-12 bg-zinc-300 rounded-sm"></div>
        </div>

        <div class="flex flex-col items-center mb-4">
            <div class="text-center glass !rounded-full w-20 h-20 flex flex-col justify-center border-rose-500/30 border-t-4">
                <p class="text-2xl font-orbitron font-black text-gray-900" id="speedDisplay">0</p>
                <p class="text-[8px] uppercase font-bold text-gray-500">MPH</p>
            </div>
        </div>

        <div id="accel-pedal" class="pedal pedal-accel">
            <span class="text-[10px] font-black uppercase text-rose-600 mb-2">Gas</span>
            <div class="w-8 h-16 bg-zinc-300 rounded-sm"></div>
        </div>
    </div>
</div>

<script>
    let scene, camera, renderer, player, road;
    let enemies = [], buildings = [], items = [], lanes = [], particles = [];
    let gameActive = false, score = 0, highScore = localStorage.getItem('turbo_plus_highscore') || 0;
    
    // Physics & State
    let speed = 0, targetSpeedCap = 0.4, acceleration = 0.001, friction = 0.0003, brakingPower = 0.012;
    let nitroAmount = 0, isBoosting = false, hasShield = false;
    let isAccelerating = false, isBraking = false, targetLane = 0, cameraShake = 0;
    const LANE_WIDTH = 4.5;
    
    const ui = {
        score: document.getElementById('score'),
        finalScore: document.getElementById('finalScore'),
        speedDisplay: document.getElementById('speedDisplay'),
        nitroFill: document.getElementById('nitro-fill'),
        shieldStatus: document.getElementById('shield-status'),
        overlay: document.getElementById('overlay'),
        startMenu: document.getElementById('start-menu'),
        gameOverMenu: document.getElementById('gameover-menu'),
        accelBtn: document.getElementById('accel-pedal'),
        brakeBtn: document.getElementById('brake-pedal')
    };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        // Visibility range badha di (900 -> 1200)
        scene.fog = new THREE.Fog(0x87ceeb, 150, 1200);

        camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 2500);
        camera.position.set(0, 5, 14);
        camera.lookAt(0, 1, -10);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(100, 200, 50);
        sun.castShadow = true;
        scene.add(sun);

        createEnvironment();
        createPlayer();

        // Control Handling
        window.addEventListener('resize', onWindowResize);
        window.addEventListener('keydown', e => {
            if (!gameActive) return;
            if (e.key === 'ArrowLeft' || e.key === 'a') targetLane = Math.max(-1, targetLane - 1);
            if (e.key === 'ArrowRight' || e.key === 'd') targetLane = Math.min(1, targetLane + 1);
            if (e.key === 'ArrowUp' || e.key === 'w') isAccelerating = true;
            if (e.key === 'ArrowDown' || e.key === 's') isBraking = true;
            if (e.key === 'Shift') activateNitro();
        });
        window.addEventListener('keyup', e => {
            if (e.key === 'ArrowUp' || e.key === 'w') isAccelerating = false;
            if (e.key === 'ArrowDown' || e.key === 's') isBraking = false;
        });
        
        const setupPedal = (el, type, val) => {
            el.addEventListener('mousedown', () => type === 'acc' ? isAccelerating = val : isBraking = val);
            el.addEventListener('mouseup', () => type === 'acc' ? isAccelerating = !val : isBraking = !val);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); type === 'acc' ? isAccelerating = val : isBraking = val; });
            el.addEventListener('touchend', (e) => { e.preventDefault(); type === 'acc' ? isAccelerating = !val : isBraking = !val; });
        };
        setupPedal(ui.accelBtn, 'acc', true);
        setupPedal(ui.brakeBtn, 'brake', true);

        animate();
    }

    function createEnvironment() {
        // Road - Extended for visibility
        road = new THREE.Mesh(new THREE.PlaneGeometry(24, 3000), new THREE.MeshPhongMaterial({ color: 0x333333 }));
        road.rotation.x = -Math.PI / 2;
        scene.add(road);

        // Grass & Mountains
        const grass = new THREE.Mesh(new THREE.PlaneGeometry(1500, 3000), new THREE.MeshPhongMaterial({ color: 0x3d7a37 }));
        grass.rotation.x = -Math.PI / 2; grass.position.y = -0.1; scene.add(grass);

        for(let i=0; i<150; i++) {
            // Mountains
            const mSize = 80 + Math.random() * 120;
            const mountain = new THREE.Mesh(new THREE.ConeGeometry(mSize, mSize * 0.8, 4), new THREE.MeshPhongMaterial({ color: 0x4b6e46 }));
            mountain.position.set((Math.random() > 0.5 ? 1 : -1) * (250 + Math.random()*300), mSize*0.4, -i * 30);
            scene.add(mountain);
            buildings.push(mountain);

            // Buildings
            const bh = 25 + Math.random() * 50;
            const bw = 15 + Math.random() * 15;
            const b = new THREE.Mesh(new THREE.BoxGeometry(bw, bh, bw), new THREE.MeshPhongMaterial({ color: 0xdddddd }));
            b.position.set((Math.random() > 0.5 ? 1 : -1) * (50 + Math.random()*50), bh/2, -i * 20);
            scene.add(b);
            buildings.push(b);
        }

        // Lanes
        for (let z = -1500; z < 100; z += 20) {
            [-LANE_WIDTH/2, LANE_WIDTH/2].forEach(x => {
                const line = new THREE.Mesh(new THREE.PlaneGeometry(0.2, 8), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                line.rotation.x = -Math.PI / 2; line.position.set(x, 0.02, z);
                scene.add(line); lanes.push(line);
            });
        }
    }

    function createPlayer() {
        player = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.7, 4.5), new THREE.MeshPhongMaterial({ color: 0xf43f5e }));
        body.position.y = 0.6; body.castShadow = true; player.add(body);
        const glass = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.6, 2.4), new THREE.MeshPhongMaterial({ color: 0x111111 }));
        glass.position.set(0, 1.1, -0.2); player.add(glass);
        
        const flameGeo = new THREE.ConeGeometry(0.3, 1, 8);
        const flameMat = new THREE.MeshBasicMaterial({ color: 0x3b82f6, transparent: true, opacity: 0 });
        const f1 = new THREE.Mesh(flameGeo, flameMat); f1.rotation.x = Math.PI/2; f1.position.set(0.6, 0.5, -2.5); player.add(f1);
        const f2 = f1.clone(); f2.position.x = -0.6; player.add(f2);
        player.userData.flames = [f1, f2];

        const shieldGeo = new THREE.SphereGeometry(3, 16, 16);
        const shieldMat = new THREE.MeshBasicMaterial({ color: 0x22ff22, transparent: true, opacity: 0 });
        const shield = new THREE.Mesh(shieldGeo, shieldMat);
        shield.position.y = 1;
        player.add(shield);
        player.userData.shieldMesh = shield;

        scene.add(player);
    }

    function createVehicleMesh(type, color) {
        const group = new THREE.Group();
        
        if (type === 'bus') {
            // Huge Bus Model
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(2.6, 2.8, 11), // Badi Bus
                new THREE.MeshPhongMaterial({ color })
            );
            body.position.y = 1.5;
            group.add(body);

            // Windows
            const windows = new THREE.Mesh(
                new THREE.BoxGeometry(2.7, 1.0, 9),
                new THREE.MeshPhongMaterial({ color: 0x222222 })
            );
            windows.position.y = 2.0;
            group.add(windows);

            // Front Screen
            const front = new THREE.Mesh(
                new THREE.BoxGeometry(2.4, 1.5, 0.1),
                new THREE.MeshPhongMaterial({ color: 0x111111 })
            );
            front.position.set(0, 1.8, 5.5);
            group.add(front);
        } else {
            // Detailed Car
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(2.4, 0.8, 5),
                new THREE.MeshPhongMaterial({ color })
            );
            body.position.y = 0.6;
            group.add(body);

            const cabin = new THREE.Mesh(
                new THREE.BoxGeometry(2.0, 0.7, 2.8),
                new THREE.MeshPhongMaterial({ color: 0x111111 })
            );
            cabin.position.set(0, 1.2, -0.2);
            group.add(cabin);
        }

        // Wheels
        const wheelGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.4, 16);
        const wheelMat = new THREE.MeshPhongMaterial({ color: 0x000000 });
        const wheelPos = type === 'bus' ? 4.5 : 2.0;
        
        [[-1.2, 0.5, wheelPos], [1.2, 0.5, wheelPos], [-1.2, 0.5, -wheelPos], [1.2, 0.5, -wheelPos]].forEach(p => {
            const w = new THREE.Mesh(wheelGeo, wheelMat);
            w.rotation.z = Math.PI/2;
            w.position.set(...p);
            group.add(w);
        });

        return group;
    }

    function spawnItem() {
        if (!gameActive || items.length > 5) return;
        const types = ['coin', 'coin', 'coin', 'nitro', 'shield'];
        const type = types[Math.floor(Math.random() * types.length)];
        const lane = Math.floor(Math.random() * 3) - 1;
        
        let mesh;
        if(type === 'coin') {
            mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, 0.2, 16), new THREE.MeshPhongMaterial({ color: 0xffcc00 }));
            mesh.rotation.x = Math.PI/2;
        } else if(type === 'nitro') {
            mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 1.2, 8), new THREE.MeshPhongMaterial({ color: 0x3b82f6 }));
        } else {
            mesh = new THREE.Mesh(new THREE.IcosahedronGeometry(0.8), new THREE.MeshPhongMaterial({ color: 0x22ff22 }));
        }

        mesh.position.set(lane * LANE_WIDTH, 1, -1000); // Spawn further
        scene.add(mesh);
        items.push({ mesh, type });
    }

    function activateNitro() {
        if (nitroAmount > 10 && !isBoosting) {
            isBoosting = true;
            setTimeout(() => isBoosting = false, 3000);
        }
    }

    function initiateStart() {
        ui.overlay.style.opacity = '0';
        setTimeout(() => {
            ui.overlay.classList.add('hidden');
            startGame();
        }, 500);
    }

    function startGame() {
        gameActive = true; score = 0; speed = 0; targetLane = 0; nitroAmount = 50; hasShield = false;
        player.position.set(0, 0, 0);
        enemies.forEach(e => scene.remove(e.mesh)); enemies = [];
        items.forEach(i => scene.remove(i.mesh)); items = [];
        ui.shieldStatus.classList.add('hidden');
    }

    function gameOver() {
        gameActive = false; cameraShake = 3.0;
        ui.finalScore.innerText = Math.floor(score);
        ui.overlay.classList.remove('hidden');
        ui.overlay.style.opacity = '1';
        ui.gameOverMenu.classList.remove('hidden');
        ui.startMenu.classList.add('hidden');
    }

    function update() {
        if (!gameActive) return;

        if (isBoosting && nitroAmount > 0) {
            speed += acceleration * 4;
            nitroAmount -= 0.5;
            player.userData.flames.forEach(f => f.material.opacity = 0.8);
        } else {
            isBoosting = false;
            player.userData.flames.forEach(f => f.material.opacity = 0);
            if (isAccelerating) speed += acceleration;
            else if (isBraking) speed -= brakingPower;
            else speed -= friction;
        }
        
        speed = Math.max(0, Math.min(speed, isBoosting ? 0.9 : targetSpeedCap));
        targetSpeedCap += 0.000005;
        score += speed * 5;
        ui.score.innerText = Math.floor(score);
        ui.speedDisplay.innerText = Math.floor(speed * 400);
        ui.nitroFill.style.width = nitroAmount + '%';
        player.userData.shieldMesh.material.opacity = hasShield ? 0.3 : 0;

        player.position.x += (targetLane * LANE_WIDTH - player.position.x) * 0.12;
        player.rotation.z = (targetLane * LANE_WIDTH - player.position.x) * -0.07;
        camera.position.x = player.position.x * 0.2;
        camera.fov = 70 + (speed * 30);
        camera.updateProjectionMatrix();

        if(cameraShake > 0) {
            camera.position.x += (Math.random()-0.5) * cameraShake;
            camera.position.y += (Math.random()-0.5) * cameraShake;
            cameraShake *= 0.9;
        }

        const scrollSpeed = speed * 40;
        lanes.forEach(l => { l.position.z += scrollSpeed; if(l.position.z > 50) l.position.z -= 1500; });
        buildings.forEach(b => { b.position.z += scrollSpeed * 0.8; if(b.position.z > 100) b.position.z = -1500; });

        if (Math.random() < 0.015) spawnItem();
        for (let i = items.length - 1; i >= 0; i--) {
            const item = items[i];
            item.mesh.position.z += scrollSpeed;
            item.mesh.rotation.y += 0.05;

            const dist = player.position.distanceTo(item.mesh.position);
            if (dist < 3.5) {
                if (item.type === 'coin') score += 500;
                else if (item.type === 'nitro') nitroAmount = Math.min(100, nitroAmount + 30);
                else if (item.type === 'shield') { hasShield = true; ui.shieldStatus.classList.remove('hidden'); }
                scene.remove(item.mesh); items.splice(i, 1);
                continue;
            }
            if (item.mesh.position.z > 50) { scene.remove(item.mesh); items.splice(i, 1); }
        }

        // Enemy Logic - Spawn further at -1000 for visibility
        if (Math.random() < 0.02 && enemies.length < 6 && speed > 0.1) {
            const lane = Math.floor(Math.random() * 3) - 1;
            const type = Math.random() > 0.7 ? 'bus' : 'car';
            const enemy = createVehicleMesh(type, new THREE.Color().setHSL(Math.random(), 0.7, 0.5));
            enemy.position.set(lane * LANE_WIDTH, 0, -1000); 
            scene.add(enemy);
            enemies.push({ mesh: enemy, type, speed: speed * 0.3 });
        }

        for (let i = enemies.length - 1; i >= 0; i--) {
            const e = enemies[i];
            e.mesh.position.z += scrollSpeed + (e.speed * 40);
            
            const dx = Math.abs(player.position.x - e.mesh.position.x);
            const dz = Math.abs(player.position.z - e.mesh.position.z);
            const hitDepth = e.type === 'bus' ? 8.5 : 5.0;
            const hitWidth = e.type === 'bus' ? 2.4 : 2.2;

            if (dx < hitWidth && dz < hitDepth) {
                if (hasShield) {
                    hasShield = false; ui.shieldStatus.classList.add('hidden');
                    scene.remove(e.mesh); enemies.splice(i, 1);
                    cameraShake = 1.0;
                } else gameOver();
            }
            if (e.mesh.position.z > 50) { scene.remove(e.mesh); enemies.splice(i, 1); }
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        update();
        renderer.render(scene, camera);
    }

    window.onload = init;
    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }
</script>
</body>
</html>
